info:
  name: Create Filter
  type: http
  seq: 1

http:
  method: POST
  url: "{{SERVER_URL}}/api/v1/filters"
  body:
    type: json
    data: |-
      {
        // Required:
        "name": "Ha 7nm",
        "band": "H-alpha",
        // Optional:
        "bandwidth_nm": 7.0,
        "brand": "Optolong",
        "model": "L-eNhance"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
