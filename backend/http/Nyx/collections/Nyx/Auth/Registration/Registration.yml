info:
  name: Registration
  type: http
  seq: 2

http:
  method: POST
  url: "{{SERVER_URL}}/api/v1/auth/register"
  body:
    type: json
    data: |-
      {
        "email": "{{USER_EMAIL}}",
        "password": "{{USER_PASSWORD}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
