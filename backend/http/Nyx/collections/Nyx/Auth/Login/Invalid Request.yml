info:
  name: Invalid Request
  type: http
  seq: 1

http:
  method: POST
  url: "{{SERVER_URL}}/api/v1/auth/login"
  body:
    type: json
    data: |-
      {
        "password": "{{USER_PASSWORD}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
