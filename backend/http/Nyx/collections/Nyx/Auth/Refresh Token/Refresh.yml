info:
  name: Refresh
  type: http
  seq: 1

http:
  method: POST
  url: "{{SERVER_URL}}/api/v1/auth/refresh"
  body:
    type: json
    data: |-
      {
        "refresh_token": "{{REFRESH_TOKEN}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const access_token = res('data.access_token');
        const refresh_token = res('data.refresh_token');

        if (access_token) {
          bru.setEnvVar("ACCESS_TOKEN", access_token);
        }

        if (refresh_token) {
          bru.setEnvVar("REFRESH_TOKEN", refresh_token);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
