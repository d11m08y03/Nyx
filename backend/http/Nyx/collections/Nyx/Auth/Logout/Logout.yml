info:
  name: Logout
  type: http
  seq: 3

http:
  method: POST
  url: "{{SERVER_URL}}/api/v1/auth/logout"
  body:
    type: json
    data: |-
      {
        "refresh_token": "{{REFRESH_TOKEN}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
