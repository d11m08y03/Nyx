info:
  name: Create Camera
  type: http
  seq: 1

http:
  method: POST
  url: "{{SERVER_URL}}/api/v1/cameras"
  body:
    type: json
    data: |-
      {
        // Required:
        "name": "ASI294MC",
        "sensor_type": "CMOS",
        // Optional:
        "brand": "ZWO",
        "model": "ASI294MC Pro",
        "pixel_size_um": 4.63,
        "resolution": "4144x2822"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
